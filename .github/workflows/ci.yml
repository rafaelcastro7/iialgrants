name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    name: Lint · Typecheck · Test · Evals
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install
        run: bun install --frozen-lockfile
      - name: Lint
        run: bun run lint
      # Single vitest invocation generates JUnit + JSON reports AND v8 coverage
      # (gated by the thresholds in vitest.config.ts — a regression fails here).
      - name: Unit + Evals + Coverage (gates 1, 2 & 4: unit, golden regression, coverage)
        run: bunx vitest run --coverage 2>&1 | tee reports/vitest.log
      - name: E2E pipeline (gate 3: discover · enrich · evaluate · shortlist · NotebookLM)
        # Explicit re-run keeps the pipeline regression signal isolated from
        # the broader suite; both runs feed the same artifact bundle.
        run: bunx vitest run src/agents/discoverer.e2e.test.ts src/agents/pipeline.e2e.test.ts 2>&1 | tee reports/e2e.log
      - name: Discover & Enrich CI gate (snapshot grant count + rules)
        # Hard fail on regression: any change in seeded grant count or any
        # rule-engine error breaks the build immediately.
        run: bunx vitest run src/agents/discover-enrich.gate.test.ts 2>&1 | tee reports/gate.log
      # Upload test logs + coverage on failure so a red build is debuggable
      # without re-running CI locally. `if: failure()` keeps green builds lean.
      - name: Upload test logs (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: |
            reports/
          retention-days: 14
      - name: Upload coverage report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage/
          retention-days: 14
      - name: Build
        run: bun run build
