# Supabase Local Stack for IIAL Grants
# Run: docker compose up -d
# Stop: docker compose down -v
# Hyper-V reserves 54285-54484, so we use 1543x range

services:
  # ── PostgreSQL + pgvector ─────────────────────────────────────────────
  db:
    build:
      context: .
      dockerfile: Dockerfile.db
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_PASSWORD: your-super-secret-and-long-postgres-password
      POSTGRES_DB: postgres
    volumes:
      - ./volumes/db/init:/docker-entrypoint-initdb.d
      - db-data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_preload_libraries=pg_cron
        -c cron.database_name=postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── GoTrue (Auth) ────────────────────────────────────────────────────
  auth:
    image: supabase/gotrue:v2.158.1
    restart: unless-stopped
    ports:
      - "15433:9999"
    depends_on:
      db:
        condition: service_healthy
    environment:
      API_EXTERNAL_URL: http://localhost:15435
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://postgres:your-super-secret-and-long-postgres-password@db:5432/postgres?search_path=auth
      GOTRUE_SITE_URL: http://localhost:5173
      GOTRUE_URI_ALLOW_LIST: ""
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_SMS_AUTOCONFIRM: "true"
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_EXP: 3600
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_ROLE: anon
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_JWT_ISSUER: http://localhost:15435
      GOTRUE_JWT_SECRET: your-super-secret-and-long-postgres-password
      GOTRUE_EXTERNAL_ANONYMOUS_USERS_ENABLED: "false"
      APP_NAME: IIAL Grants
      APP_URL: http://localhost:5173

  # ── PostgREST ────────────────────────────────────────────────────────
  rest:
    image: postgrest/postgrest:v12.2.3
    restart: unless-stopped
    ports:
      - "15434:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://postgres:your-super-secret-and-long-postgres-password@db:5432/postgres
      PGRST_DB_SCHEMAS: public,storage,graphql_public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: your-super-secret-and-long-postgres-password
      PGRST_DB_USE_LEGACY_GUCS: "false"

  # ── Kong (API Gateway) ──────────────────────────────────────────────
  kong:
    image: kong:3.9
    restart: unless-stopped
    ports:
      - "15435:8000"
    depends_on:
      rest:
        condition: service_started
      auth:
        condition: service_started
    volumes:
      - ./volumes/kong/kong.yml:/var/lib/kong/kong.yml:ro
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /var/lib/kong/kong.yml
      KONG_DNS_RESOLVER: 127.0.0.11

  # ── Meta (schema introspection) ─────────────────────────────────────
  meta:
    image: supabase/postgres-meta:v0.84.2
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PG_META_DB_HOST: db
      PG_META_DB_PORT: 5432
      PG_META_DB_NAME: postgres
      PG_META_DB_USER: postgres
      PG_META_DB_PASSWORD: your-super-secret-and-long-postgres-password

volumes:
  db-data:
