  - consumer: service_role
    group: admin

plugins:
  - name: key-auth
    config:
      hide_credentials: false
  - name: acl
    config:
      hide_groups_header: true
      allow:
        - admin
        - anon

services:
  - name: auth
    url: http://auth:9999/
    routes:
      - name: auth_v1_open
        strip_path: true
        paths:
          - /auth/v1
      - name: auth_v1_private
        strip_path: true
        paths:
          - /auth/v1
  - name: rest
    url: http://rest:3000/
    routes:
      - name: rest_v1
        strip_path: true
        paths:
          - /rest/v1
