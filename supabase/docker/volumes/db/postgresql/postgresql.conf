# Custom PostgreSQL config for IIAL Grants local dev
# Include pg_cron and keep defaults

listen_addresses = '*'
port = 5432
max_connections = 100
shared_buffers = 128MB
dynamic_shared_memory_type = tempfile
wal_level = replica
max_wal_senders = 10
max_replication_slots = 10
hot_standby = on
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql.log'
log_min_messages = warning
log_min_error_statement = error
log_duration = off
log_statement = 'ddl'
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 0
idle_in_transaction_session_timeout = 60000
statement_timeout = 60000

# pg_cron
shared_preload_libraries = 'pg_cron'
cron.database_name = 'postgres'
